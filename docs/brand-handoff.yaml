        - "Budget de marketing por canal"
        - "KPI dashboard com targets mensais"
        - "Framework de segmentação de leads"
      depende_de: "Brand Brief aprovado"
      bloqueado_por: []

    - agent: "Bauhaus"
      role: "Produção de Assets Visuais"
      recebe: "Brand Book do Scher"
      entrega:
        - "Deck de apresentação para parceiros B2B2B"
        - "Template de proposta comercial"
        - "Banner LinkedIn"
        - "Template de relatório de uptime"
      depende_de: "Scher (Brand Book)"
      bloqueado_por: ["Scher"]

    - agent: "Ive"
      role: "QA de Marca"
      recebe: "Todos os entregáveis anteriores"
      entrega:
        - "Auditoria de consistência de identidade"
        - "Checklist de voice guide aplicado"
        - "Gate: APPROVED / NEEDS_WORK / FAIL"
      depende_de: "Todos os agentes anteriores"
      bloqueado_por: ["Haviv", "Scher", "Bierut", "Ogilvy", "Godin", "Kotler", "Bauhaus"]

  discovery_decisions:
    - decisao: "Arquétipo Primário = Guardião"
      alternativa_rejeitada: "Herói — muito agressivo para mercado conservador jurídico"
      justificativa: "O Guardião comunica proteção e confiabilidade sem agressividade; ideal para advogados conservadores"

    - decisao: "Posicionamento = Infraestrutura (não ferramenta de produtividade)"
      alternativa_rejeitada: "Ferramenta de produtividade / 'monitoramento mais eficiente'"
      justificativa: "Posicionamento como infraestrutura expande mercado endereçável (B2B2B + integradores) e torna comparação direta com concorrentes estruturalmente inválida"

    - decisao: "Tom = Direto e institucional"
      alternativa_rejeitada: "Próximo e informal"
      justificativa: "Contexto de missão crítica (responsabilidade civil, prazos fatais) exige seriedade. Informalidade seria dissonante com o que o cliente precisa sentir ao confiar dados críticos"

    - decisao: "ZAG = 'Camada de resiliência' (não 'monitoramento melhor')"
      alternativa_rejeitada: "'O melhor monitoramento processual do Brasil'"
      justificativa: "'Melhor monitoramento' convida comparação direta. 'Camada de resiliência' é categoria diferente — não pode ser comparada com ferramentas existentes"

    - decisao: "B2B2B como canal prioritário de longo prazo"
      alternativa_rejeitada: "Competir frontalmente com Astrea/Projuris"
      justificativa: "Gestores de escritório são clientes potenciais da API, não concorrentes. Uma parceria com Astrea ou Projuris pode trazer volume de usuários indiretos impossível de atingir via marketing direto"

    - decisao: "Free tier com 10 processos (não 30-40 como concorrentes)"
      alternativa_rejeitada: "Free tier mais generoso para competir com Astrea Light (40 processos)"
      justificativa: "O Free com 10 processos cria friction natural para conversão. A proposta de valor da Litix não é volume de processos gratuitos — é confiabilidade. Um advogado que experimenta os 10 processos mais críticos e vê funcionar converte para pago"

  blockers:
    - "Brief precisa de aprovação formal do stakeholder antes de acionar Haviv e demais agentes"
    - "Decisões de arquétipo, tom e ZAG precisam ser validadas pelo fundador antes da execução visual"
    - "SLA contratual de 99,5% mencionado no posicionamento precisa de validação jurídica antes de publicação"

  dependencies:
