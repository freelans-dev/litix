        - "Templates de comunicação por contexto"
      depende_de: "Brand Brief aprovado"
      bloqueado_por: []

    - agent: "Ogilvy"
      role: "Copy de Alta Conversão"
      recebe: "Brief completo + Voice Guide do Bierut"
      entrega:
