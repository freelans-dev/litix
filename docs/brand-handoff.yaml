handoff:
  brief_version: "v1.0"
  approved_at: "PENDENTE"
  approved_by: "PENDENTE"
  project: "Litix"
  date: "2026-03-02"
  author: "Neumeier (Brand Visionary — Squad Elite Branding & Marketing)"
  brief_location: "docs/brand-strategy-brief-litix.md"

  core:
    brand_name: "Litix"
    tagline_options:
      - "5 providers. 1 resposta. Sempre."
      - "A camada de resiliência para dados jurídicos."
      - "Monitoramento processual que nunca falha."
      - "Infraestrutura jurídica. Não um painel."

    zag: >
      A Litix é a única plataforma de dados processuais no Brasil posicionada como
      infraestrutura de resiliência — não como ferramenta de usuário final. Opera em
      camada acima dos providers individuais (Escavador, Judit, Codilo, Predictus, DataJud),
      entregando dados com fallback automático, webhook push, SLA contratual e transparência
      de fonte — atributos que nenhum concorrente possui simultaneamente. O espaço que ocupa
      é o mesmo que Twilio ocupa para comunicação e Stripe para pagamentos: infraestrutura
      confiável que abstrai a complexidade dos provedores subjacentes.

    golden_circle:
      why: >
        A Litix existe porque a justiça não pode depender de um único ponto de falha.
        Dados jurídicos confiáveis são infraestrutura crítica — tão fundamentais quanto
        a eletricidade de um hospital. Quando a tecnologia que deveria proteger direitos
        processuais falha silenciosamente, quem paga o preço é o cidadão. A Litix existe
        para que isso não aconteça.
      how: >
        Cinco providers simultâneos com circuit breakers automáticos. Webhook push com
        HMAC-SHA256, retry exponencial e dead-letter queue. Transparência total de fonte
        (completenessScore + mergedFrom + provider attribution). SLA contratual de 99,5%
        — o primeiro do mercado. Estratégias de orquestração configuráveis por request
        (race, fallback, primary-only). O cliente controla, a Litix garante.
      what: >
        Plataforma SaaS B2B de monitoramento e consulta processual com redundância de
        5 providers simultâneos, cobrindo 92 tribunais brasileiros. Para escritórios:
        importe sua OAB e nunca consulte um portal de tribunal manualmente. Para
        integradores: API com OpenAPI 3.1, webhook push, SLA contratual e o único
        multi-provider com fallback automático do mercado.

    brand_personality:
      archetype_primary: "Guardião (Protector/Caretaker)"
      archetype_secondary: "Sábio (Sage)"
      traits:
        - "Confiável antes de ser rápido"
        - "Transparente antes de ser impressionante"
        - "Preciso antes de ser bonito"
        - "Institucional antes de ser moderno"
        - "Resiliente antes de ser feature-rich"

    somos_x_nao_y:
      - somos: "infraestrutura"
        nao: "um painel"
      - somos: "resilientes"
        nao: "apenas rápidos"
      - somos: "transparentes"
        nao: "opacos"
      - somos: "B2B de verdade"
        nao: "B2C com roupagem enterprise"
      - somos: "parceiros dos gestores de escritório"
        nao: "concorrentes"
      - somos: "precisos"
        nao: "genéricos"

    visual_guardrails:
      must_communicate:
        - "Confiabilidade institucional — autoridade visual de sistema que não pode falhar"
        - "Precisão técnica — elementos que sugerem dados em fluxo, monitoramento ativo"
        - "Transparência — estrutura clara, hierarquia visual evidente, nada escondido"
        - "Modernidade contida — tech sem assustar advogado conservador"
      must_never_communicate:
        - "Exuberância startup (gradientes coloridos, ilustrações fofinhas, mascotes)"
        - "Juridicismo antiquado (balança da justiça, togas, colunas gregas)"
        - "Agressividade de growth hacking (CTAs piscando, contadores de urgência)"
        - "Genericidade SaaS (dashboard genérico azul de qualquer produto)"

    verbal_guardrails:
      must_sound:
        - "Direta e precisa — frases curtas, verbos ativos"
        - "Confiante sem arrogância — declarações afirmativas sem superlativo desnecessário"
        - "Técnica sem ser hermética — usa termos corretos com contexto"
        - "Empática com o risco — reconhece consequências humanas sem ser dramática"
        - "Português formal com 'você' — nunca 'tu', nunca startup english"
      must_never_sound:
        - "Juridiquês — não usa termos do CPC como afetação"
        - "Startup jargão — 'disruptiva', 'game-changer', 'inovar o setor'"
        - "Genérica — 'solução completa', 'plataforma robusta', 'ferramenta poderosa'"
        - "Alarmista — o risco é real, mas a marca vende tranquilidade, não medo"

