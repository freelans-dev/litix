      responsavel: "Fundador / Lead"
      prazo: "Antes de acionar qualquer outro agente"
    - acao: "Preencher 'approved_at' e 'approved_by' neste arquivo"
      responsavel: "Lead"
      prazo: "Após aprovação"
    - acao: "Acionar Haviv com a Seção 9 do brief"
      responsavel: "Lead (após aprovação)"
      prazo: "Primeiro após aprovação"
    - acao: "Acionar Bierut em paralelo com Haviv"
      responsavel: "Lead (após aprovação)"
      prazo: "Simultaneamente ao Haviv"
    - acao: "Acionar Godin e Kotler após aprovação do brief"
      responsavel: "Lead (após aprovação)"
      prazo: "Simultaneamente a Haviv e Bierut"
