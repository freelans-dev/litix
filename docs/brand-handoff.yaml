        - "Hero section completa por persona"
        - "Copy de pricing"
        - "E-mails de ativação e nurture"
        - "9 anúncios LinkedIn (3 por persona)"
      depende_de: "Bierut (Voice Guide)"
      bloqueado_por: ["Bierut"]

    - agent: "Godin"
      role: "Estratégia de Conteúdo & Calendário"
      recebe: "Seção 10 do brief"
      entrega:
