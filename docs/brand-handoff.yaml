        - "Grid e layout system"
        - "Padrões de uso do logo em contextos de produto"
      depende_de: "Haviv (logo aprovado)"
      bloqueado_por: ["Haviv"]

    - agent: "Bierut"
      role: "Voice Guide & Manifesto"
      recebe: "Seções 3, 4 e 7 do brief"
