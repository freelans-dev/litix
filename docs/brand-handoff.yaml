    - "Preciso"
    - "Resiliente"

  logo_deve:
    - "Comunicar confiabilidade — sério, não excitante"
    - "Sugerir movimento e continuidade (dados em fluxo)"
    - "Comunicar proteção — estrutura que sustenta, não que ataca"
    - "Funcionar em fundo escuro #162032 e fundo branco"
    - "Ser legível em 16px (favicon) e 300px (apresentação)"
