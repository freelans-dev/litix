        - "Wordmark + símbolo separável"
        - "Versões: horizontal, vertical, favicon, mark"
        - "Paleta expandida com tokens"
      depende_de: "Brand Brief aprovado"
      bloqueado_por: []

    - agent: "Scher"
      role: "Brand Book & Sistema Visual"
      recebe: "Brief completo + logo aprovado do Haviv"
      entrega:
